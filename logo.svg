<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cardpine logo">
  <title>cardpine</title>
  <defs>
    <linearGradient id="cp-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2fbf9a"/>
      <stop offset="1" stop-color="#1f8f8f"/>
    </linearGradient>
  </defs>
  <!-- back card, offset for a small stack -->
  <rect x="30" y="26" width="60" height="80" rx="12" fill="#173a3f"/>
  <!-- front card -->
  <rect x="20" y="18" width="60" height="80" rx="12" fill="url(#cp-card)"/>
  <!-- an original pine mark built from three stacked triangles -->
  <g fill="#eafaf3">
    <polygon points="50,30 62,50 38,50"/>
    <polygon points="50,44 66,68 34,68"/>
    <polygon points="50,60 70,88 30,88"/>
    <rect x="46" y="86" width="8" height="8" rx="2"/>
  </g>
</svg>
